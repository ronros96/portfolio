name: Deploy dist to GitHub Pages

on:
  push:
    branches:
      - main # Change to 'master' if your default branch uses that name

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-dir: '.' 

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Upload dist Folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # This points GitHub Pages directly to your dist folder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
